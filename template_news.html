<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  :root{ --bone:#f4f1ea; --bone-dim:#b8b2a6; --accent:#c0392f; --line:rgba(244,241,234,.18); }
  *{margin:0;padding:0;box-sizing:border-box;}
  /* fond TRANSPARENT : la photo sera glissee derriere */
  html,body{width:1080px;height:1920px;overflow:hidden;background:transparent;}
  .slide{
    position:relative;width:1080px;height:1920px;background:transparent;
    overflow:hidden;isolation:isolate;
    font-family:'Archivo','Helvetica Neue',Arial,sans-serif;
  }
  .serif{font-family:'Bodoni Moda','Didot','Times New Roman',serif;}

  /* ----- HAUT : voile sombre + logo + categorie ----- */
  .top-veil{
    position:absolute;top:0;left:0;right:0;height:420px;z-index:2;
    background:linear-gradient(180deg, rgba(8,8,10,.92) 0%, rgba(8,8,10,.7) 55%, rgba(8,8,10,0) 100%);
    pointer-events:none;
  }
  .topbar{
    position:absolute;top:0;left:0;right:0;z-index:7;
    display:flex;align-items:center;justify-content:space-between;
    padding:60px;color:var(--bone);
  }
  .brand{font-size:48px;font-weight:800;letter-spacing:.01em;}
  .brand span{color:var(--accent);}
  .cat-tag{
    font-size:28px;letter-spacing:.22em;text-transform:uppercase;color:#0a0a0c;
    background:var(--accent);padding:16px 30px;border-radius:120px;font-weight:700;
  }
  .top-club{
    position:absolute;z-index:7;top:170px;left:60px;
    display:flex;align-items:center;gap:24px;
    font-size:34px;letter-spacing:.18em;text-transform:uppercase;color:var(--bone);
  }
  .top-club .dot{width:14px;height:14px;border-radius:50%;background:var(--accent);}

  /* ----- BAS : bandeau dégradé + texte info ----- */
  .bottom-veil{
    position:absolute;bottom:0;left:0;right:0;height:920px;z-index:2;
    background:linear-gradient(0deg, rgba(8,8,10,.96) 0%, rgba(8,8,10,.9) 38%, rgba(8,8,10,.55) 72%, rgba(8,8,10,0) 100%);
    pointer-events:none;
  }
  .info-block{
    position:absolute;z-index:7;left:60px;right:60px;bottom:120px;
  }
  .eyebrow{
    font-size:30px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);
    display:flex;align-items:center;gap:22px;margin-bottom:28px;
  }
  .eyebrow::before{content:"";width:74px;height:2px;background:var(--accent);}
  .headline{
    font-family:'Bodoni Moda','Didot',serif;font-weight:900;
    color:var(--bone);font-size:84px;line-height:1.02;letter-spacing:-.005em;
  }
  .subline{
    margin-top:30px;font-size:34px;line-height:1.4;color:var(--bone-dim);
    font-family:'Archivo',sans-serif;font-weight:400;
    max-width:880px;
  }
  .foot{
    position:absolute;z-index:7;bottom:54px;left:60px;right:60px;
    display:flex;justify-content:space-between;align-items:center;
    border-top:1px solid var(--line);padding-top:30px;
    font-size:26px;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-dim);
  }
  .foot .src{color:var(--bone);}

  /* guide visuel de la zone photo (invisible au rendu final) */
  .photo-hint{
    position:absolute;top:430px;left:0;right:0;bottom:480px;z-index:1;
    border:0;
  }

  /* ====== SLIDE 2 : explication, fond degrade sombre neutre ====== */
  .bg2{
    position:absolute;inset:0;z-index:1;
    background:radial-gradient(125% 90% at 50% -8%, #26262c 0%, #131318 55%, #0a0a0c 100%);
  }
  .topbar2{
    position:absolute;top:0;left:0;right:0;z-index:7;
    display:flex;align-items:center;justify-content:space-between;
    padding:60px;color:var(--bone);
  }
  .s2-club{
    position:absolute;z-index:7;top:172px;left:60px;
    display:flex;align-items:center;gap:24px;
    font-size:34px;letter-spacing:.18em;text-transform:uppercase;color:var(--bone);
  }
  .s2-club .dot{width:14px;height:14px;border-radius:50%;background:var(--accent);}
  .s2-body{
    position:absolute;z-index:7;left:60px;right:60px;top:300px;
  }
  .s2-eyebrow{
    font-size:30px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);
    display:flex;align-items:center;gap:22px;margin-bottom:34px;
  }
  .s2-eyebrow::before{content:"";width:74px;height:2px;background:var(--accent);}
  .s2-title{
    font-family:'Bodoni Moda','Didot',serif;font-weight:900;
    color:var(--bone);font-size:68px;line-height:1.04;letter-spacing:-.005em;
    margin-bottom:50px;
  }
  .s2-text{
    font-family:'Archivo',sans-serif;font-weight:400;
    color:#d8d3c8;font-size:40px;line-height:1.5;
  }
</style>
</head>
<body>
<div class="slide serif" data-slide="news">
  <div class="top-veil"></div>
  <div class="bottom-veil"></div>

  <div class="topbar">
    <div class="brand">MÊLÉE<span>.</span>MERCATO</div>
    <div class="cat-tag">{{CATEGORY}}</div>
  </div>
  <div class="top-club"><span class="dot"></span>{{CLUB}}</div>

  <div class="photo-hint"></div>

  <div class="info-block">
    <div class="eyebrow">{{EYEBROW}}</div>
    <div class="headline">{{HEADLINE}}</div>
    <div class="subline">{{SUBLINE}}</div>
  </div>
  <div class="foot">
    <span>{{DATE}}</span>
    <span class="src">Source · {{SOURCE}}</span>
  </div>
</div>

<!-- ===== SLIDE 2 : EXPLICATION (fond degrade sombre) ===== -->
<div class="slide serif" data-slide="news2">
  <div class="bg2"></div>
  <div class="topbar2">
    <div class="brand">MÊLÉE<span>.</span>MERCATO</div>
    <div class="cat-tag">{{CATEGORY}}</div>
  </div>
  <div class="s2-club"><span class="dot"></span>{{CLUB}}</div>

  <div class="s2-body">
    <div class="s2-eyebrow">{{EYEBROW}}</div>
    <div class="s2-title">{{HEADLINE2}}</div>
    <div class="s2-text">{{ARTICLE}}</div>
  </div>

  <div class="foot">
    <span>{{DATE}}</span>
    <span class="src">Source · {{SOURCE}}</span>
  </div>
</div>
<script>
  // Auto-ajustement : reduit la police d'un element jusqu'a tenir en hauteur max.
  function fitText(el, maxHeight, minPx) {
    if (!el) return;
    let size = parseFloat(getComputedStyle(el).fontSize);
    while (el.scrollHeight > maxHeight && size > minPx) {
      size -= 2;
      el.style.fontSize = size + "px";
    }
  }
  // slide 1 : headline ne doit pas depasser ~520px de haut
  fitText(document.querySelector('.headline'), 520, 48);
  // slide 2 : titre limite + texte article limite
  fitText(document.querySelector('.s2-title'), 460, 40);
  fitText(document.querySelector('.s2-text'), 760, 28);
</script>
</body>
</html>
