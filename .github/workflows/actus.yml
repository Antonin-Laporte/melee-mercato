name: Melee Mercato - actus du jour

on:
  schedule:
    - cron: '30 6 * * *'      # ~08h30 Paris (decale de 30min apres les transferts)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installer les dependances
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Generer les habillages actus
        run: python run_news.py

      - name: Construire le dashboard (manifest + fichiers)
        run: |
          python build_manifest.py
          echo "=== contenu de docs/data ==="
          ls -R docs/data || echo "docs/data absent"

      - name: Publier sur GitHub Pages + historique
        run: |
          git config user.name  "melee-mercato-bot"
          git config user.email "bot@melee-mercato.local"
          git add -f docs/ posted_news.json 2>/dev/null || true
          git status --short
          git commit -m "maj dashboard + actus du jour" || echo "rien a committer"
          git pull --rebase --autostash origin main 2>/dev/null || true
          git push || echo "rien a pousser"
      - name: Empaqueter les habillages
        uses: actions/upload-artifact@v4
        with:
          name: actus-du-jour
          path: actus/
          if-no-files-found: ignore
          retention-days: 14
